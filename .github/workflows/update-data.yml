name: Update sector performance data

on:
  schedule:
    # 15:00 UTC = 20:30 IST. Set later than market close (15:30 IST) with a
    # deliberate buffer: GitHub Actions scheduled runs commonly fire several
    # hours late (observed ~6-7hr delay on this repo), and Yahoo Finance's own
    # EOD index data isn't always published immediately after close either.
    # This buffer reduces (does not guarantee) landing before Yahoo has the
    # day's close ready.
    - cron: "0 15 * * 1-5"
    # 02:00 UTC = 07:30 IST, Tue-Sat — a next-morning catch-up run. By this
    # point any Yahoo publishing lag from the evening before has long cleared,
    # so this self-corrects the previous day's close if the evening run
    # happened to catch it early, well before that day's market opens.
    - cron: "0 2 * * 2-6"
  workflow_dispatch: {}  # allows manual "Run workflow" trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch data
        run: python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sector_performance.json
          git diff --quiet --cached || git commit -m "Update sector performance data $(date -u +'%Y-%m-%d')"
          git push

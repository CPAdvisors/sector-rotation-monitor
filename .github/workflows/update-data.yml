name: Update sector performance data

on:
  schedule:
    # 12:30 UTC = 18:00 IST, well after the 15:30 IST NSE close
    - cron: "30 12 * * 1-5"
  workflow_dispatch: {}  # allows manual "Run workflow" trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Fetch data
        run: python scripts/fetch_data.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/sector_performance.json
          git diff --quiet --cached || git commit -m "Update sector performance data $(date -u +'%Y-%m-%d')"
          git push
